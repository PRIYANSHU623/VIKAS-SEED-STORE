# ============================================================
# Let's Encrypt / Certbot Configuration
# ============================================================
# This file configures Certbot for automatic SSL certificate
# management with Let's Encrypt

# Email address for Let's Encrypt notifications
email = admin@yourdomain.com

# Agree to Let's Encrypt terms of service
agree-tos = True

# Use non-interactive mode
non-interactive = True

# Use webroot authenticator
authenticator = webroot
webroot-path = /var/www/certbot

# Domain list
domains = yourdomain.com,www.yourdomain.com,api.yourdomain.com

# RSA key size
rsa-key-size = 4096

# Keep at least this many certificates around
keep_until_expiring = True

# How often to renew (in days)
renew_before_expiry = 30

# Auto-restart web server on renewal
post_hook = nginx -s reload
